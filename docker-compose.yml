version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ============================================================
  # Backend (FastAPI + LangGraph + embedded Chroma)
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - RAGUARD_ENV=production
      - DATABASE_URL=sqlite:///data/raguard.db
      - CHROMA_DATA_PATH=/app/data/chroma_db
      - LANGFUSE_HOST=http://langfuse-server:3000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
    volumes:
      - ./data:/app/data
      - ./data/uploads:/app/uploads
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================================
  # Chroma Vector Database
  # ============================================================
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Frontend (React + Vite, served as static files via nginx)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging

  # ============================================================
  # Langfuse Observability Platform
  # ============================================================
  langfuse-server:
    image: langfuse/langfuse:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
      - DATABASE_URL=postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      - SALT=${LANGFUSE_SALT}
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    profiles: ["full", "observability"]

  langfuse-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=langfuse
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=${LANGFUSE_DB_PASSWORD}
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    profiles: ["full", "observability"]

volumes:
  chroma_data:
    driver: local
  langfuse_db_data:
    driver: local
